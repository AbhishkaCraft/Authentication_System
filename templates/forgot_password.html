<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
 <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <p class="flash-message">{{ message }}</p>
    {% endfor %}
    {% endif %}
    {% endwith %}

   
   
   
        <h1>Forgot your password? </h1>

        <p class="subtitle">
           Don't worry! Enter your email address and we'll help you reset your password.
        </p>


    <form method="POST">
<div class="form-group">
        <label>Email :</label>
        <input  class="input-box" type="email" name="email" placeholder="Enter your registered email" required>

        </div>

        <button type="submit" id="verify-email">
            Verify Email
        </button>

    </form>
</div>
</body>

</html>
