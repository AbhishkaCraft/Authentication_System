<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Login</title>
</head>

<body>
    <div class="container">
    {% with messages = get_flashed_messages() %}

    {% if messages %}

    {% for message in messages %}

    <p class="flash-message">{{ message }}</p>

    {% endfor %}

    {% endif %}

    {% endwith %}

    

    <h1>Welcome Back</h1>
    <form action="/login" method="POST">
<div class="form-group">
        <label>Email :</label>
        <input class="input-box" type="email" name="email" placeholder="Enter your email" required>
</div>
        <br><br>
<div class="form-group">
        <label>Password :</label>
        <div class="password-container">
        <input class="input-box" type="password" name="password" id="password" placeholder="Enter your password" required>

        <button type="button" id="togglePassword">
            Show
        </button>
        
        </div>
        <p>
        <a href="/forgot-password">Forgot Password?</a>
    </p>
</div>
        <br><br>

        <button type="submit" id="register">Login</button>

    </form>
    
    <p>
        Don't have an account?
        <a href="/signup">Sign Up</a>
    </p>
</div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
